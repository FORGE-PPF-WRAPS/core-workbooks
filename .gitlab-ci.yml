# GitLab Pages — public manual downloads
pages:
  stage: deploy
  script:
    - echo "Publishing Skill Forge core operations manuals"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "cursor-design-system"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
